site_name: django-outputs
site_description: Asynchronous data exports and scheduled recurring exports for Django
repo_url: https://github.com/PragmaticMates/django-outputs
repo_name: PragmaticMates/django-outputs

docs_dir: docs

theme:
  name: material
  palette:
    primary: deep orange
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Installation: installation.md
  - Models: models.md
  - Mixins: mixins.md
  - Admin: admin.md
  - Signals: signals.md
  - Processing (Jobs, Usecases, Cron): processing.md
  - Scheduled Exports: scheduled-exports.md

plugins:
  - search
